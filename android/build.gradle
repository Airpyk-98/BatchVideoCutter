buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        exclusiveContent {
            filter {
                includeGroup "app.notifee"
            }
            forRepository {
                maven {
                    url "$rootDir/../node_modules/@notifee/react-native/android/libs"
                }
            }
        }
        exclusiveContent {
            filter {
                includeGroup "io.github.maitrungduc1410"
            }
            forRepository {
                mavenCentral()
            }
        }
    }
    configurations.all {
        resolutionStrategy.dependencySubstitution {
            substitute module("com.arthenica:ffmpeg-kit-https:6.0-2") using module("io.github.maitrungduc1410:ffmpeg-kit-https:6.0-2")
            substitute module("com.arthenica:smart-exception-java:0.2.1") using module("io.github.maitrungduc1410:smart-exception-java:0.2.1")
            substitute module("app.notifee:core") using module("app.notifee:core:202108261754")
        }
    }
}
